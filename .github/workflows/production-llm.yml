name: LLM-Production

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout theme repo
      uses: actions/checkout@main
      with:
          repository: aspose-omr/Aspose.OMR-Products-Airspace
          token: ${{ secrets.REPO_TOKEN }}
          fetch-depth: 0 
    - name: Setup Hugo
      uses: peaceiris/actions-hugo@v2
      with:
          hugo-version: '0.110.0'
          extended: true
    - name: Install autoprefixer
      run:  npm install -D --save autoprefixer
    - name: Install postcss-cli
      run:  npm install -D --save postcss-cli
    - name: Find and replace url param in frontmatter
      uses: jacobtomlinson/gha-find-replace@v2
      with:
        find: "url:"
        replace: "url_ignore:"
        include: "_index.md"
    - name: Find and replace image url domain
      uses: jacobtomlinson/gha-find-replace@v2
      with:
        find: "logoImageSrc=\"https://www.aspose.cloud/"
        replace: "logoImageSrc=\"https://cms.admin.containerize.com/"
        include: "_index.md"
    - name: Build LLM
      run: hugo --config "configs/llm.toml" -c "content/llm" -b "https://products.aspose.com/llm" --cleanDestinationDir --minify
    - name: Deploy LLM to S3
      run: hugo deploy --config "configs/llm.toml" --maxDeletes=-1 --target "production" --force
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.CEPH_PROD_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.CEPH_PROD_ACCESS_KEY_SECRET }}
        AWS_REGION: ${{ secrets.CEPH_PROD_ENDPOINT_URL }}
        AWS_ENDPOINT_URL: ${{ secrets.CEPH_PROD_REGION }}

  purge:
    runs-on: ubuntu-latest
    needs: deploy
    container:
      image: quay.io/curl/curl
    env:
      SITE_URL: https://products.aspose.com/llm
    steps:
    - name: Purge CDN
      env:
        BUNNYNET_ACCESSKEY: ${{ secrets.BUNNYNET_ACCESSKEY }}
      run: |
        curl --version
        echo "Purging ${SITE_URL}"
        curl -siG -H "X-Api-Key: ${BUNNYNET_ACCESSKEY}" --data-urlencode "url=${SITE_URL}" "https://api.dynabic.com/bn/purge?async=true"
